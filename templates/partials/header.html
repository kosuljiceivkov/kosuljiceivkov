{% load static %}
<header class="site-header" data-nav-root>
    <button
        type="button"
        class="site-nav-scrim"
        data-nav-backdrop
        hidden
        aria-label="Zatvori meni"
        tabindex="-1"
    ></button>

    <div class="container site-header__inner">
        <a class="site-logo" href="{% url 'frontend:home' %}">
            <img
                class="site-logo__img"
                src="{% static 'img/logo.webp' %}"
                alt="Cementne košuljice Ivkov"
                width="320"
                height="80"
                decoding="async"
            >
        </a>

        <button
            type="button"
            class="nav-toggle"
            data-nav-toggle
            aria-expanded="false"
            aria-controls="site-nav"
            aria-haspopup="dialog"
            aria-label="Otvori meni"
        >
            <span class="nav-toggle__icon" aria-hidden="true">
                <span class="nav-toggle__bar"></span>
                <span class="nav-toggle__bar"></span>
                <span class="nav-toggle__bar"></span>
            </span>
        </button>

        {% include "partials/nav.html" %}
    </div>
</header>
