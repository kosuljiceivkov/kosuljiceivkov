<style>
:root{--color-primary-gold:#f2b705;--color-primary-red:#dd4327;--color-primary:#dd4327;--color-btn:#f2b705;--color-brand-dark:#1b1b1d;--color-dark:#222;--color-accent:#fff;--color-bg:#f0f0f0;--color-heading:#222;--color-text:#222;--color-text-muted:#5c5c5c;--color-link:#222;--font-sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;--font-heading:system-ui,sans-serif;--container-max:90rem;--container-padding-x:1rem;--header-height:5.5rem;--header-bg:#fff;--header-border:#dd4327;--header-padding-block:0.5rem;--logo-height:2.75rem;--touch-min:2.75rem;--space-3:0.75rem;--space-4:1rem;--space-5:1.25rem;--space-6:1.5rem;--radius:0.375rem;--shadow-sm:0 1px 2px rgba(0,0,0,.06);--transition-base:150ms ease}
*,*::before,*::after{box-sizing:border-box}
html{overflow-x:clip}
body{margin:0;background:var(--color-bg);font-family:var(--font-sans);color:var(--color-text);line-height:1.5}
img{max-width:100%;height:auto;display:block}
a{color:var(--color-link);text-decoration:none}
.container{max-width:var(--container-max);margin:0 auto;padding:0 var(--container-padding-x)}

.nav-toggle{display:flex;align-items:center;justify-content:center;width:var(--touch-min);height:var(--touch-min);padding:0;border:0;border-radius:var(--radius);background:transparent;color:var(--color-brand-dark);cursor:pointer}

.home-hero__copy{display:flex;flex-direction:column;gap:var(--space-4)}

@media (min-width:48rem){.site-header{position:sticky;top:0}.home-hero__inner{display:grid;grid-template-columns:minmax(0,1.05fr) minmax(0,.95fr);grid-template-areas:"copy visual";align-items:center;gap:1.5rem 2.5rem;padding-block:3rem 4rem;min-height:clamp(22rem,72vh,36rem)}.home-hero__copy{grid-area:copy;gap:1.25rem;max-width:36rem}.home-hero__visual{grid-area:visual;max-height:none;min-height:16rem}}

.page-hero__lead{margin:0;color:var(--color-text-muted);font-size:1.0625rem;line-height:1.6;max-width:42rem}

</style>
