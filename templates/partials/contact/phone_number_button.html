{% load contact_tags %}
{% if phone %}
<a
    href="tel:{{ phone|phone_uri }}"
    class="{% if btn_class %}{{ btn_class }}{% else %}btn btn--primary btn--lg{% endif %} tel-link{% if extra_class %} {{ extra_class }}{% endif %}"
    aria-label="Pozovite {{ display|default:phone }}"
>
    {{ display|default:phone }}
</a>
{% endif %}
