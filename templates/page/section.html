<section
    class="{{ section.css_classes }}"
    data-section-id="{{ section.id }}"
    {% if section.inline_style %}style="{{ section.inline_style }}"{% endif %}
>
    <div class="iv-page-section__inner">
        {% for row in section.rows %}
            {% include "page/row.html" with row=row %}
        {% endfor %}
    </div>
</section>
