{% if block.button_label and block.button_url %}
<div class="builder-button-wrap">
    <a
        href="{{ block.button_url }}"
        class="btn btn--{{ block.button_style }} builder-button"
        {% if block.button_open_new_tab %}target="_blank" rel="noopener noreferrer"{% endif %}
    >
        {{ block.button_label }}
    </a>
</div>
{% endif %}
