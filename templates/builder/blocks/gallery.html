{% load media_tags %}
{% if gallery_images %}
<div class="builder-gallery" role="list">
    {% for item in gallery_images %}
    <figure class="builder-gallery__item" role="listitem">
        {% responsive_image item.image alt=item.alt_text css_class="builder-gallery__img" %}
        {% if item.caption %}
        <figcaption class="builder-gallery__caption">{{ item.caption }}</figcaption>
        {% endif %}
    </figure>
    {% endfor %}
</div>
{% endif %}
