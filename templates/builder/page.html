{% load static builder_tags %}
<link rel="stylesheet" href="{% static 'css/builder.css' %}?v=3">

<div class="page-builder" data-page-builder>
    {% if sections %}
        {% for section in sections %}
            {% include "builder/section.html" with section=section %}
        {% endfor %}
    {% else %}
        <p class="empty-state">Sadržaj stranice još nije dodat.</p>
    {% endif %}
</div>

{% if has_carousel %}
<script src="{% static 'js/builder-carousel.js' %}?v=2" defer></script>
{% endif %}
