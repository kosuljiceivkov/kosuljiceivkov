{% extends "base.html" %}
{% load page_tags %}

{% block content %}
<article class="blog-article">
    {% include "partials/page_breadcrumb_hero.html" with seo_object=post %}

    {% if post.should_render_page %}
        {% render_blog_page post %}
    {% endif %}

    <div class="container container--narrow">
        <p class="blog-article__back">
            <a href="{% url 'frontend:blog' %}">&larr; Nazad na blog</a>
        </p>
    </div>
</article>
{% endblock %}
